<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 星星主体 -->
  <polygon 
    points="50,5 61,35 95,35 68,55 79,85 50,70 21,85 32,55 5,35 39,35" 
    fill="url(#starGradient)" 
    stroke="#FF8C00" 
    stroke-width="2"
  />
  
  <!-- 闪光效果 -->
  <circle cx="50" cy="35" r="8" fill="white" opacity="0.6" />
  <circle cx="35" cy="50" r="5" fill="white" opacity="0.4" />
  <circle cx="65" cy="60" r="4" fill="white" opacity="0.5" />
</svg>
