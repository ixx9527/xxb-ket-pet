# ===========================================
# 星星榜 KET/PET 学习平台 - Nginx 配置
# 保留 Certbot HTTPS 配置
# ===========================================

server {
    server_name www.ixx9527.xin;

    # 前端静态资源（我们的项目）
    root /home/www/xxb-ket-pet/frontend/dist;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理（3001 端口）
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源（图片、音频等）
    location /assets/ {
        alias /home/www/xxb-ket-pet/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.ixx9527.xin/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.ixx9527.xin/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = www.ixx9527.xin) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name www.ixx9527.xin;

    listen 80;
    return 404; # managed by Certbot
}
